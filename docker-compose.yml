services:
  mongo:
    image: mongo:7
    container_name: lms-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lms

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/lms
      JWT_SECRET: ${JWT_SECRET:-lms-docker-jwt-secret}
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: uploads
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
        NEXT_PUBLIC_UPLOAD_URL: http://localhost:5000
    container_name: lms-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_UPLOAD_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
